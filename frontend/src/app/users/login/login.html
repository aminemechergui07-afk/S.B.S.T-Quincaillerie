    <section class="container my-5 py-5">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          <div class="card p-5 shadow-sm border-0" style="border-radius: 12px; border-top: 5px solid var(--primary-color) !important;">
            <h2 class="mb-4 text-center fw-bold"><i class="bi bi-box-arrow-in-right me-2"></i>Connexion</h2>
            <form [formGroup]="loginForm" (ngSubmit)="login()">
              <div class="mb-3">
                <label class="form-label text-muted fw-semibold">Email</label>
                <input formControlName="email" type="email" [ngClass]="{'form-control px-3 py-2': true, 'error': loginForm.controls['email'].invalid && loginForm.controls['email'].touched}" placeholder="Votre email" required>
              </div>
              <div class="mb-4">
                <label class="form-label text-muted fw-semibold">Password</label>
                <input formControlName="password" type="password" [ngClass]="{'form-control px-3 py-2': true, 'error': loginForm.controls['password'].invalid && loginForm.controls['password'].touched}" placeholder="Votre mot de passe" required>
              </div>
              <div class="d-flex justify-content-between align-items-center mb-4 text-muted small">
                <div>
                  <input type="checkbox" id="rememberMe"> <label for="rememberMe">Se souvenir de moi</label>
                </div>
                <a href="#" style="color:var(--primary-color); text-decoration:none;">Mot de passe oublié ?</a>
              </div>
              <button [disabled]="loginForm.invalid" type="submit" class="btn w-100 py-2 btn-add-to-cart" style="background-color: var(--primary-color); color: white; font-weight:600; border-radius:30px;">
                Se connecter
              </button>

              <div class="text-center mt-4">
                <span class="text-muted">Pas encore de compte ?</span> <a routerLink="/register" style="color:var(--primary-color); font-weight:bold; text-decoration:none;">S'inscrire</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>
