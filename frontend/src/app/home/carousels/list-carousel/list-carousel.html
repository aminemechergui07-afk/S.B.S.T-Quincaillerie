<div class="container-fluid carousel-hero-wrapper mt-5 p-0">
  <div id="heroCarousel" class="carousel slide carousel-fade carousel-hero" data-bs-ride="carousel" data-bs-pause="false">
    <div class="carousel-indicators">
      @for (carousel of carousels; track carousel._id; let i = $index) {
      <button
        type="button"
        data-bs-target="#heroCarousel"
        [attr.data-bs-slide-to]="i"
        [class.active]="i === 0"
        [attr.aria-current]="i === 0 ? 'true' : null"
        [attr.aria-label]="'Slide ' + (i + 1)"
      ></button>
      }
    </div>

    <div class="carousel-inner">
      @for (carousel of carousels; track carousel._id; let i = $index) {
      <div class="carousel-item hero-slide" [class.active]="i === 0" data-bs-interval="6000">
        <div class="hero-slide__frame">
          <img
            [src]="'http://127.0.0.1:5000/images/' + carousel.image"
            class="hero-slide__image"
            [alt]="carousel.title"
          />

          @if(user?.role == 'admin'){

          <div class="hero-slide__actions">
            <button
              [routerLink]="['/carousels/update/' + carousel._id]"
              class="btn-action edit"
              title="Modifier"
              aria-label="Modifier le carousel"
            >
              <i class="bi bi-pencil-fill"></i>
            </button>
            <button
              (click)="deleteCarousel(carousel._id)"
              class="btn-action delete"
              title="Supprimer"
              aria-label="Supprimer le carousel"
            >
              <i class="bi bi-trash-fill"></i>
            </button>
          </div>
        }

          <div class="carousel-caption hero-slide__caption">
            <div class="hero-slide__copy">
              <h5 class="hero-slide__title animate-text">{{ carousel.title }}</h5>
              <p class="hero-slide__text animate-text delay-1">{{ carousel.text }}</p>
            </div>
          </div>
        </div>
      </div>
      }
    </div>

    <button class="carousel-control-prev" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#heroCarousel" data-bs-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Next</span>
    </button>
  </div>
</div>
