    <section class="container my-5 py-4">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card shadow-sm border-0 p-4" style="border-radius:12px; border-top: 5px solid var(--primary-color) !important;">
            <h2 class="mb-4 fw-bold"><i class="bi bi-newspaper me-2"></i>Ajouter une Blog</h2>
            <form [formGroup]="blogForm" (ngSubmit)="save()">
              <div class="mb-3">
                <label class="form-label fw-semibold text-muted">Titre de l'Actualité</label>
                <input formControlName="title" type="text" [ngClass]="{'form-control px-3 py-2': true, 'error': blogForm.controls['title'].invalid && blogForm.controls['title'].touched}" placeholder="Ex: iPhone 17 Pro Max" required>
              </div>
              <div class="mb-4">
                <label class="form-label fw-semibold text-muted">Image de l'Article</label>
                <input (change)="selectImage($event)" type="file" class="form-control px-3 py-2" accept="image/*" required>
              </div>
              <div class="mb-4">
                <label class="form-label fw-semibold text-muted">Extrait de Texte</label>
                <textarea formControlName="description" [ngClass]="{'form-control px-3 py-2': true, 'error': blogForm.controls['description'].invalid && blogForm.controls['description'].touched}" rows="4" placeholder="Ce court texte s'affichera sous l'image dans la liste..." required></textarea>
              </div>
              <div class="mb-4">
                <label class="form-label fw-semibold text-muted">Contenu Complet (blockquote)</label>
                <textarea formControlName="blockquote" [ngClass]="{'form-control px-3 py-2': true, 'error': blogForm.controls['blockquote'].invalid && blogForm.controls['blockquote'].touched}" rows="6" placeholder="Contenu détaillé de l'article..."></textarea>
              </div>
              <button [disabled]="blogForm.invalid || !image" type="submit" class="btn w-100 py-2 btn-add-to-cart" style="background-color: var(--primary-color); color: white; font-weight:600; border-radius:30px;">
                <i class="bi bi-cloud-arrow-up me-2"></i> Publier l'Actualité
              </button>
            </form>
          </div>
        </div>
      </div>
    </section>
